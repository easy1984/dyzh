custom_proxy_group=🌍 国外媒体`select`[]🚀 高速节点`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 高速节点`[]🚀 节点选择`[]♻️ 自动选择
