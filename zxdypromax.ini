[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
ruleset=🌍 国外媒体,https://jxz.840120.xyz/https://raw.githubusercontent.com/easy1984/dyzh/refs/heads/main/guowai.list
